services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: playlistsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=playlistsync;Username=postgres;Password=postgres"
      Spotify__ClientId: "${SPOTIFY_CLIENT_ID}"
      Spotify__ClientSecret: "${SPOTIFY_CLIENT_SECRET}"
      Spotify__RedirectUri: "${SPOTIFY_REDIRECT_URI}"
      Tidal__ClientId: "${TIDAL_CLIENT_ID}"
      Tidal__RedirectUri: "${TIDAL_REDIRECT_URI}"
      Frontend__Url: "${APP_URL}"

volumes:
  pgdata:
