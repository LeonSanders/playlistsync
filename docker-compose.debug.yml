services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: playlistsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=playlistsync;Username=postgres;Password=postgres"
      Spotify__ClientId: "${SPOTIFY_CLIENT_ID}"
      Spotify__ClientSecret: "${SPOTIFY_CLIENT_SECRET}"
      Spotify__RedirectUri: "${SPOTIFY_REDIRECT_URI:-http://localhost/auth/spotify/callback}"
      Tidal__ClientId: "${TIDAL_CLIENT_ID}"
      Tidal__ClientSecret: "${TIDAL_CLIENT_SECRET}"
      Tidal__RedirectUri: "${TIDAL_REDIRECT_URI:-http://localhost/auth/tidal/callback}"
      Frontend__Url: "${FRONTEND_URL:-http://localhost}"
      - "ASPNETCORE_ENVIRONMENT=Development"
      - "DOTNET_USE_POLLING_FILE_WATCHER=1"
    ports:
      - "5001:5001"
      - "5001:443"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures hot-reload works in Docker

volumes:
  pgdata:
