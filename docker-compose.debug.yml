services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src
    volumes:
      - ./backend:/src
      - nuget-cache:/root/.nuget/packages
    ports:
      - "5001:5001"
      - "2222:2222" # vsdbg remote debugger port
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=playlistsync;Username=postgres;Password=postgres"
      Spotify__ClientId: "${SPOTIFY_CLIENT_ID}"
      Spotify__ClientSecret: "${SPOTIFY_CLIENT_SECRET}"
      Spotify__RedirectUri: "${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:5001/auth/spotify/callback}"
      Tidal__ClientId: "${TIDAL_CLIENT_ID}"
      Tidal__ClientSecret: "${TIDAL_CLIENT_SECRET}"
      Tidal__RedirectUri: "${TIDAL_REDIRECT_URI:-http://127.0.0.1:5001/auth/tidal/callback}"
      Frontend__Url: "http://localhost:5173"
      Logging__LogLevel__Default: Debug
      Logging__LogLevel__Microsoft.AspNetCore: Information
      Logging__LogLevel__Hangfire: Warning
    command: >
      zsh -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends unzip curl &&
        curl -sSL https://aka.ms/getvsdbgsh | bash /dev/stdin -v latest -l /vsdbg &&
        dotnet watch run --no-launch-profile
      "

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - npm-cache:/app/node_modules
    ports:
      - "5173:5173"
    command: zsh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:5001

volumes:
  nuget-cache:
  npm-cache:
  pgdata:
